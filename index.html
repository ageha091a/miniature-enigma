<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>埋め込みジェネレータ</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        
     
        #preview { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background: white; }
        
      
        .embed-card { display: flex; background: #2f3136; border-radius: 4px; overflow: hidden; max-width: 500px; margin-top: 10px; }
        .embed-bar { width: 4px; }
        .embed-content { padding: 10px; color: #dcddde; }
    </style>
</head>
<body>

<div class="container">
    <h2>埋め込みジェネレータ</h2>
    
    <div class="input-group">
        <label>タイトル</label>
        <input type="text" id="title" oninput="update()" placeholder="タイトル">
    </div>
    <div class="input-group">
        <label>説明文</label>
        <input type="text" id="desc" oninput="update()" placeholder="説明文">
    </div>
    <div class="input-group">
        <label>画像URL</label>
        <input type="text" id="img" oninput="update()" placeholder="https://cdn.discordapp.com....">
    </div>
    <div class="input-group">
        <label>左のカラー</label>
        <input type="color" id="color" oninput="update()" value="#7289da">
    </div>

    <h3>生成されたHTMLコード</h3>
    <textarea id="output" rows="6" readonly></textarea>
    <button onclick="copyCode()" style="margin-top:10px;">コードをコピー</button>

    <h3>プレビュー</h3>
    <div id="preview"></div>
</div>

<script>
    function update() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const img = document.getElementById('img').value;
        const color = document.getElementById('color').value;

        const htmlCode = `<div style="display:flex; background:#2f3136; border-radius:4px; max-width:500px; font-family:sans-serif;">
  <div style="width:4px; background:${color};"></div>
  <div style="padding:10px; color:#dcddde;">
    <h3 style="margin:0 0 5px 0;">${title}</h3>
    <p style="margin:0 0 10px 0; font-size:14px;">${desc}</p>
    <img src="${img}" style="max-width:100%; border-radius:4px;">
  </div>
</div>`;

        document.getElementById('output').value = htmlCode;
        document.getElementById('preview').innerHTML = htmlCode;
    }

    function copyCode() {
        const output = document.getElementById("output");
        output.select();
        document.execCommand("copy");
        alert("コピーしました！");
    }


    update();
</script>

</body>
</html>
