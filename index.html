<!DOCTYPE html>
<html lang="ja">
<head>
  <meta property="og:title" content="埋め込み作成ツール">
<meta property="og:description" content="さいつよ">
<meta property="og:image" content="https://cdn.discordapp.com/attachments/1492843371268669490/1493147291664650320/image.png?ex=69dde947&is=69dc97c7&hm=89a768160c0de3d0b7ac2a2f487d5d6f084f6a2eace4dcc95da92f1ac5ec1aaf">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0037ff">
    <meta charset="UTF-8">
    <title>埋め込み作成ツール</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .wrapper { display: flex; gap: 20px; max-width: 1000px; margin: 0 auto; }
        .panel { background: white; padding: 20px; border-radius: 8px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        textarea { width: 100%; height: 250px; font-family: monospace; font-size: 12px; }
        .preview-box { background: #2f3136; border-radius: 4px; display: flex; overflow: hidden; margin-top: 10px; color: #dcddde; }
        .color-bar { width: 4px; }
        .content { padding: 12px; width: 100%; }
        .title { font-weight: bold; margin: 0 0 5px 0; color: white; }
        .desc { font-size: 14px; margin: 0 0 10px 0; color: #b9bbbe; }
        .thumb { width: 100%; border-radius: 4px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="panel">
        <h2>設定入力</h2>
        <div class="input-group">
            <label>左のバーの色</label>
            <input type="color" id="color" value="#7289da" oninput="update()">
        </div>
        <div class="input-group">
            <label>サイトタイトル</label>
            <input type="text" id="title" value="私のサイト" oninput="update()">
        </div>
        <div class="input-group">
            <label>説明文</label>
            <input type="text" id="desc" value="これは説明文です" oninput="update()">
        </div>
        <div class="input-group">
            <label>画像URL</label>
            <input type="text" id="img" value="https://cdn.discordapp.com/........" oninput="update()">
        </div>
        <div class="input-group">
            <label>サイトアイコンURL</label>
            <input type="text" id="favicon" value="" placeholder="https://example.com/icon.png" oninput="update()">
        </div>
    </div>

    <div class="panel">
        <h2>プレビュー</h2>
        <div class="preview-box">
            <div id="preview-bar" class="color-bar"></div>
            <div class="content">
                <div class="title" id="preview-title">私のサイト</div>
                <div class="desc" id="preview-desc">これは説明文です</div>
                <img class="thumb" id="preview-img" src="https://via.placeholder.com/300x150">
            </div>
        </div>

        <h3>出力コード (headに追加)</h3>
        <textarea id="output" readonly></textarea>
        <button onclick="copyCode()">コードをコピー</button>
    </div>
</div>

<script>
    function update() {
        const title = document.getElementById('title').value;
        const desc = document.getElementById('desc').value;
        const img = document.getElementById('img').value;
        const color = document.getElementById('color').value;
        const favicon = document.getElementById('favicon').value;
        
        document.getElementById('preview-bar').style.backgroundColor = color;
        document.getElementById('preview-title').innerText = title;
        document.getElementById('preview-desc').innerText = desc;
        document.getElementById('preview-img').src = img;
        
        let code = `<meta property="og:title" content="${title}">
<meta property="og:description" content="${desc}">
<meta property="og:image" content="${img}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="${color}">`;

        if (favicon) {
            code += `\n<link rel="icon" href="${favicon}">`;
        }
        
        document.getElementById('output').value = code;
    }

    function copyCode() {
        document.getElementById("output").select();
        document.execCommand("copy");
        alert("コードをコピーしました！");
    }

    update(); 
</script>

</body>
</html>
